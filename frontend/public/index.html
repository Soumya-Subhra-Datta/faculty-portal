<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Powered Faculty Duty & Substitution Management Portal</title>
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Material UI -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <script src="https://unpkg.com/@mui/material@5.15.0/umd/material-ui.production.min.js"></script>
  
  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  
  <!-- Axios -->
  <script src="https://unpkg.com/axios@1.6.2/dist/axios.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    #root {
      min-height: 100vh;
    }
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      width: 100%;
      max-width: 450px;
    }
    .dashboard-container {
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: linear-gradient(180deg, #1a237e 0%, #0d47a1 100%);
      color: white;
      padding: 20px;
    }
    .sidebar h2 {
      font-size: 20px;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      transition: all 0.3s;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.15);
    }
    .nav-item .material-icons {
      margin-right: 12px;
    }
    .main-content {
      flex: 1;
      padding: 30px;
      background: #f5f5f5;
      overflow-y: auto;
    }
    .page-header {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 24px;
    }
    .stat-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .stat-card h3 {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-size: 32px;
      font-weight: bold;
      color: #1a237e;
    }
    .data-table {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th {
      background: #f5f5f5;
      padding: 16px;
      text-align: left;
      font-weight: 500;
      color: #666;
    }
    td {
      padding: 16px;
      border-bottom: 1px solid #eee;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-assigned { background: #e3f2fd; color: #1976d2; }
    .status-confirmed { background: #e8f5e9; color: #388e3c; }
    .status-pending { background: #fff3e0; color: #f57c00; }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 600px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #666;
      font-weight: 500;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    .notification-badge {
      background: #f44336;
      color: white;
      border-radius: 50%;
      padding: 2px 8px;
      font-size: 12px;
      margin-left: 8px;
    }
    .notification-panel {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
      margin-bottom: 24px;
    }
    .notification-item {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: flex-start;
    }
    .notification-item:last-child {
      border-bottom: none;
    }
    .notification-icon {
      margin-right: 12px;
      color: #1976d2;
    }
    .notification-content h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }
    .notification-content p {
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, createContext, useContext } = React;
    const { AppBar, Toolbar, Typography, Button, IconButton, Menu, MenuItem, Card, CardContent, TextField, Select, FormControl, InputLabel, Table, TableBody, TableCell, TableContainer, TableHead, TableRow, Paper, Box, Chip, Alert, Snackbar } = MaterialUI;
    
    // API Base URL
    const API_URL = 'http://localhost:5000/api';
    
    // Auth Context
    const AuthContext = createContext();
    
    // Login Page Component
    function Login({ onLogin }) {
      const [username, setUsername] = useState('admin');
      const [password, setPassword] = useState('admin123');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError('');
        
        try {
          const response = await axios.post(`${API_URL}/auth/login`, { username, password });
          localStorage.setItem('token', response.data.token);
          localStorage.setItem('admin', JSON.stringify(response.data.admin));
          onLogin(response.data.admin);
        } catch (err) {
          setError(err.response?.data?.message || 'Login failed');
        } finally {
          setLoading(false);
        }
      };
      
      return (
        <div className="login-container">
          <div className="login-card">
            <div style={{ textAlign: 'center', marginBottom: 30 }}>
              <span className="material-icons" style={{ fontSize: 48, color: '#1a237e' }}>school</span>
              <h1 style={{ color: '#1a237e', marginTop: 16 }}>Faculty Portal</h1>
              <p style={{ color: '#666', marginTop: 8 }}>AI-Powered Duty & Substitution Management</p>
            </div>
            
            {error && <Alert severity="error" style={{ marginBottom: 20 }}>{error}</Alert>}
            
            <form onSubmit={handleSubmit}>
              <div className="form-group">
                <label>Username</label>
                <input type="text" value={username} onChange={(e) => setUsername(e.target.value)} />
              </div>
              <div className="form-group">
                <label>Password</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} />
              </div>
              <Button 
                type="submit" 
                variant="contained" 
                fullWidth 
                style={{ background: '#1a237e', padding: '14px', marginTop: 10 }}
                disabled={loading}
              >
                {loading ? 'Logging in...' : 'Login'}
              </Button>
            </form>
            
            <p style={{ textAlign: 'center', marginTop: 20, color: '#666', fontSize: 13 }}>
              Demo: admin / admin123
            </p>
          </div>
        </div>
      );
    }
    
    // Dashboard Component
    function Dashboard() {
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [duties, setDuties] = useState([]);
      const [faculty, setFaculty] = useState([]);
      const [substitutions, setSubstitutions] = useState([]);
      const [timetable, setTimetable] = useState([]);
      const [notifications, setNotifications] = useState([]);
      const [loading, setLoading] = useState(true);
      
      // Duty Assignment Form
      const [dutyForm, setDutyForm] = useState({
        faculty_id: '',
        duty_type: 'exam',
        duty_date: '',
        start_time: '09:00:00',
        end_time: '12:00:00',
        location: ''
      });
      const [submitting, setSubmitting] = useState(false);
      const [successMsg, setSuccessMsg] = useState('');
      
      useEffect(() => {
        loadData();
        connectSocket();
      }, []);
      
      const connectSocket = () => {
        const socket = io('http://localhost:5000');
        socket.on('connect', () => {
          console.log('Connected to server');
          socket.emit('join_admin');
        });
        socket.on('notification', (data) => {
          setNotifications(prev => [data, ...prev]);
        });
      };
      
      const loadData = async () => {
        try {
          const [dutiesRes, facultyRes, subsRes, timetableRes, notifRes] = await Promise.all([
            axios.get(`${API_URL}/duties`),
            axios.get(`${API_URL}/faculty`),
            axios.get(`${API_URL}/substitutions`),
            axios.get(`${API_URL}/timetable`),
            axios.get(`${API_URL}/notifications/0`)
          ]);
          setDuties(dutiesRes.data);
          setFaculty(facultyRes.data);
          setSubstitutions(subsRes.data);
          setTimetable(timetableRes.data);
          setNotifications(notifRes.data);
        } catch (err) {
          console.error('Error loading data:', err);
        } finally {
          setLoading(false);
        }
      };
      
      const handleDutySubmit = async (e) => {
        e.preventDefault();
        setSubmitting(true);
        
        try {
          const response = await axios.post(`${API_URL}/duties`, dutyForm);
          setSuccessMsg(`Duty assigned! ${response.data.automation?.substitutions?.length || 0} substitutions created automatically.`);
          setDutyForm({ faculty_id: '', duty_type: 'exam', duty_date: '', start_time: '09:00:00', end_time: '12:00:00', location: '' });
          loadData();
        } catch (err) {
          console.error('Error creating duty:', err);
        } finally {
          setSubmitting(false);
        }
      };
      
      const renderDashboard = () => (
        <div>
          <div className="page-header">
            <h2>📊 Admin Dashboard</h2>
            <p style={{ color: '#666', marginTop: 8 }}>Overview of faculty duties and substitutions</p>
          </div>
          
          <div className="stat-cards">
            <div className="stat-card">
              <h3>Total Faculty</h3>
              <div className="value">{faculty.length}</div>
            </div>
            <div className="stat-card">
              <h3>Today's Duties</h3>
              <div className="value">{duties.length}</div>
            </div>
            <div className="stat-card">
              <h3>Active Substitutions</h3>
              <div className="value">{substitutions.filter(s => s.status === 'confirmed').length}</div>
            </div>
            <div className="stat-card">
              <h3>Timetable Slots</h3>
              <div className="value">{timetable.length}</div>
            </div>
          </div>
          
          {notifications.length > 0 && (
            <div className="notification-panel">
              <h3 style={{ marginBottom: 16 }}>🔔 Recent Notifications</h3>
              {notifications.slice(0, 5).map((notif, index) => (
                <div key={index} className="notification-item">
                  <span className="material-icons notification-icon">notifications</span>
                  <div className="notification-content">
                    <h4>{notif.title}</h4>
                    <p>{notif.message}</p>
                  </div>
                </div>
              ))}
            </div>
          )}
          
          <div className="data-table">
            <h3 style={{ padding: 20 }}>📋 Recent Duties</h3>
            <TableContainer>
              <Table>
                <TableHead>
                  <TableRow>
                    <TableCell>Faculty</TableCell>
                    <TableCell>Type</TableCell>
                    <TableCell>Date</TableCell>
                    <TableCell>Time</TableCell>
                    <TableCell>Location</TableCell>
                    <TableCell>Status</TableCell>
                  </TableRow>
                </TableHead>
                <TableBody>
                  {duties.slice(0, 10).map((duty) => (
                    <TableRow key={duty.id}>
                      <TableCell>{duty.faculty_name}</TableCell>
                      <TableCell><Chip label={duty.duty_type} size="small" /></TableCell>
                      <TableCell>{new Date(duty.duty_date).toLocaleDateString()}</TableCell>
                      <TableCell>{duty.start_time} - {duty.end_time}</TableCell>
                      <TableCell>{duty.location || '-'}</TableCell>
                      <TableCell>
                        <span className={`status-badge status-${duty.status}`}>{duty.status}</span>
                      </TableCell>
                    </TableRow>
                  ))}
                </TableBody>
              </Table>
            </TableContainer>
          </div>
        </div>
      );
      
      const renderAssignDuty = () => (
        <div>
          <div className="page-header">
            <h2>📝 Assign Duty</h2>
            <p style={{ color: '#666', marginTop: 8 }}>Assign a duty and let AI automatically manage substitutions</p>
          </div>
          
          {successMsg && (
            <Alert severity="success" style={{ marginBottom: 20 }} onClose={() => setSuccessMsg('')}>
              {successMsg}
            </Alert>
          )}
          
          <div className="form-container">
            <form onSubmit={handleDutySubmit}>
              <div className="form-group">
                <label>Faculty Member</label>
                <select 
                  value={dutyForm.faculty_id} 
                  onChange={(e) => setDutyForm({...dutyForm, faculty_id: e.target.value})}
                  required
                >
                  <option value="">Select Faculty</option>
                  {faculty.map(f => (
                    <option key={f.id} value={f.id}>{f.name} - {f.department}</option>
                  ))}
                </select>
              </div>
              
              <div className="form-group">
                <label>Duty Type</label>
                <select 
                  value={dutyForm.duty_type} 
                  onChange={(e) => setDutyForm({...dutyForm, duty_type: e.target.value})}
                >
                  <option value="exam">Exam</option>
                  <option value="invigilation">Invigilation</option>
                  <option value="placement">Placement</option>
                  <option value="event">Event</option>
                  <option value="meeting">Meeting</option>
                  <option value="other">Other</option>
                </select>
              </div>
              
              <div className="form-group">
                <label>Date</label>
                <input 
                  type="date" 
                  value={dutyForm.duty_date} 
                  onChange={(e) => setDutyForm({...dutyForm, duty_date: e.target.value})}
                  required
                />
              </div>
              
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                <div className="form-group">
                  <label>Start Time</label>
                  <input 
                    type="time" 
                    value={dutyForm.start_time} 
                    onChange={(e) => setDutyForm({...dutyForm, start_time: e.target.value})}
                    required
                  />
                </div>
                <div className="form-group">
                  <label>End Time</label>
                  <input 
                    type="time" 
                    value={dutyForm.end_time} 
                    onChange={(e) => setDutyForm({...dutyForm, end_time: e.target.value})}
                    required
                  />
                </div>
              </div>
              
              <div className="form-group">
                <label>Location</label>
                <input 
                  type="text" 
                  value={dutyForm.location} 
                  onChange={(e) => setDutyForm({...dutyForm, location: e.target.value})}
                  placeholder="e.g., Exam Hall, Conference Room"
                />
              </div>
              
              <Button 
                type="submit" 
                variant="contained" 
                fullWidth
                style={{ background: '#1a237e', padding: '14px' }}
                disabled={submitting}
              >
                {submitting ? 'Processing...' : 'Assign Duty & Auto-Substitute'}
              </Button>
            </form>
          </div>
        </div>
      );
      
      const renderSubstitutions = () => (
        <div>
          <div className="page-header">
            <h2>🔄 Substitutions</h2>
            <p style={{ color: '#666', marginTop: 8 }}>View all substitution assignments</p>
          </div>
          
          <div className="data-table">
            <TableContainer>
              <Table>
                <TableHead>
                  <TableRow>
                    <TableCell>Original Faculty</TableCell>
                    <TableCell>Substitute</TableCell>
                    <TableCell>Subject</TableCell>
                    <TableCell>Year/Section</TableCell>
                    <TableCell>Date</TableCell>
                    <TableCell>Time</TableCell>
                    <TableCell>Status</TableCell>
                    <TableCell>AI Selected</TableCell>
                  </TableRow>
                </TableHead>
                <TableBody>
                  {substitutions.map((sub) => (
                    <TableRow key={sub.id}>
                      <TableCell>{sub.original_faculty_name}</TableCell>
                      <TableCell>{sub.substitute_faculty_name}</TableCell>
                      <TableCell>{sub.subject}</TableCell>
                      <TableCell>{sub.year} {sub.section}</TableCell>
                      <TableCell>{new Date(sub.substitution_date).toLocaleDateString()}</TableCell>
                      <TableCell>{sub.start_time} - {sub.end_time}</TableCell>
                      <TableCell>
                        <span className={`status-badge status-${sub.status}`}>{sub.status}</span>
                      </TableCell>
                      <TableCell>
                        {sub.ai_selected ? '🤖 Yes' : '👤 Manual'}
                      </TableCell>
                    </TableRow>
                  ))}
                </TableBody>
              </Table>
            </TableContainer>
          </div>
        </div>
      );
      
      const renderTimetable = () => (
        <div>
          <div className="page-header">
            <h2>📅 Timetable</h2>
            <p style={{ color: '#666', marginTop: 8 }}>View complete faculty timetable</p>
          </div>
          
          <div className="data-table">
            <TableContainer>
              <Table>
                <TableHead>
                  <TableRow>
                    <TableCell>Faculty</TableCell>
                    <TableCell>Day</TableCell>
                    <TableCell>Time</TableCell>
                    <TableCell>Subject</TableCell>
                    <TableCell>Year/Section</TableCell>
                    <TableCell>Room</TableCell>
                  </TableRow>
                </TableHead>
                <TableBody>
                  {timetable.map((slot) => (
                    <TableRow key={slot.id}>
                      <TableCell>{slot.faculty_name}</TableCell>
                      <TableCell>{slot.day_of_week}</TableCell>
                      <TableCell>{slot.start_time} - {slot.end_time}</TableCell>
                      <TableCell>{slot.subject}</TableCell>
                      <TableCell>{slot.year} {slot.section}</TableCell>
                      <TableCell>{slot.room}</TableCell>
                    </TableRow>
                  ))}
                </TableBody>
              </Table>
            </TableContainer>
          </div>
        </div>
      );
      
      const renderFaculty = () => (
        <div>
          <div className="page-header">
            <h2>👥 Faculty</h2>
            <p style={{ color: '#666', marginTop: 8 }}>View all faculty members</p>
          </div>
          
          <div className="data-table">
            <TableContainer>
              <Table>
                <TableHead>
                  <TableRow>
                    <TableCell>Name</TableCell>
                    <TableCell>Email</TableCell>
                    <TableCell>Department</TableCell>
                    <TableCell>Designation</TableCell>
                    <TableCell>Workload (hrs)</TableCell>
                    <TableCell>Available</TableCell>
                  </TableRow>
                </TableHead>
                <TableBody>
                  {faculty.map((f) => (
                    <TableRow key={f.id}>
                      <TableCell>{f.name}</TableCell>
                      <TableCell>{f.email}</TableCell>
                      <TableCell>{f.department}</TableCell>
                      <TableCell>{f.designation}</TableCell>
                      <TableCell>{f.workload_hours}</TableCell>
                      <TableCell>
                        <span className={`status-badge ${f.is_available ? 'status-confirmed' : 'status-pending'}`}>
                          {f.is_available ? 'Available' : 'Unavailable'}
                        </span>
                      </TableCell>
                    </TableRow>
                  ))}
                </TableBody>
              </Table>
            </TableContainer>
          </div>
        </div>
      );
      
      const renderPage = () => {
        switch(currentPage) {
          case 'dashboard': return renderDashboard();
          case 'assign-duty': return renderAssignDuty();
          case 'substitutions': return renderSubstitutions();
          case 'timetable': return renderTimetable();
          case 'faculty': return renderFaculty();
          default: return renderDashboard();
        }
      };
      
      return (
        <div className="dashboard-container">
          <div className="sidebar">
            <h2>🎓 Faculty Portal</h2>
            <nav>
              <div className={`nav-item ${currentPage === 'dashboard' ? 'active' : ''}`} onClick={() => setCurrentPage('dashboard')}>
                <span className="material-icons">dashboard</span>
                Dashboard
              </div>
              <div className={`nav-item ${currentPage === 'assign-duty' ? 'active' : ''}`} onClick={() => setCurrentPage('assign-duty')}>
                <span className="material-icons">assignment</span>
                Assign Duty
              </div>
              <div className={`nav-item ${currentPage === 'substitutions' ? 'active' : ''}`} onClick={() => setCurrentPage('substitutions')}>
                <span className="material-icons">swap_horiz</span>
                Substitutions
              </div>
              <div className={`nav-item ${currentPage === 'timetable' ? 'active' : ''}`} onClick={() => setCurrentPage('timetable')}>
                <span className="material-icons">calendar_today</span>
                Timetable
              </div>
              <div className={`nav-item ${currentPage === 'faculty' ? 'active' : ''}`} onClick={() => setCurrentPage('faculty')}>
                <span className="material-icons">people</span>
                Faculty
              </div>
              <div className="nav-item" onClick={() => { localStorage.clear(); window.location.reload(); }}>
                <span className="material-icons">logout</span>
                Logout
              </div>
            </nav>
          </div>
          <div className="main-content">
            {loading ? (
              <div style={{ textAlign: 'center', padding: 60 }}>
                <span className="material-icons" style={{ fontSize: 48, color: '#1a237e' }}>hourglass_empty</span>
                <p style={{ marginTop: 16 }}>Loading...</p>
              </div>
            ) : renderPage()}
          </div>
        </div>
      );
    }
    
    // Main App
    function App() {
      const [admin, setAdmin] = useState(null);
      
      useEffect(() => {
        const token = localStorage.getItem('token');
        const savedAdmin = localStorage.getItem('admin');
        if (token && savedAdmin) {
          setAdmin(JSON.parse(savedAdmin));
        }
      }, []);
      
      return admin ? <Dashboard /> : <Login onLogin={setAdmin} />;
    }
    
    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
